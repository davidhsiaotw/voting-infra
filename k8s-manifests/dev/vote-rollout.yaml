apiVersion: v1
kind: Service
metadata:
  name: vote
  namespace: dev
  labels:
    app: voting-app-vote
spec:
  ports:
  - port: 80
    targetPort: 80
    name: http
  selector:
    app: voting-app-vote
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: voting-app-vote
  namespace: dev
  labels:
    app: voting-app-vote
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voting-app-vote
  template:
    metadata:
      labels:
        app: voting-app-vote
    spec:
      containers:
      - name: vote
        image: 471318789453.dkr.ecr.us-east-1.amazonaws.com/voting-app-vote:dev-b60992e
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /api/options
            port: 80
          initialDelaySeconds: 2
          periodSeconds: 5
  strategy:
    canary:
      steps:
      - setWeight: 50
      - pause: {duration: 30s}