resources:
- ../../base/vote
- ../../base/result
- ../../base/worker
- ../../base/frontend
- ../../base/redis
- ../../base/db

commonLabels:
  environment: prod

secretGenerator:
- name: db-secret
  type: Opaque
  literals:
  - password=postgres # Default for prod

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
images:
- name: frontend
  newName: 563571752566.dkr.ecr.us-east-1.amazonaws.com/voting-app-frontend
  newTag: latest
- name: result
  newName: 563571752566.dkr.ecr.us-east-1.amazonaws.com/voting-app-result
  newTag: latest
- name: vote
  newName: 563571752566.dkr.ecr.us-east-1.amazonaws.com/voting-app-vote
  newTag: latest
- name: worker
  newName: 563571752566.dkr.ecr.us-east-1.amazonaws.com/voting-app-worker
  newTag: latest