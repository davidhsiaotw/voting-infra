resources:
- ../../base/vote
- ../../base/result
- ../../base/worker
- ../../base/frontend
- ../../base/redis
- ../../base/db

commonLabels:
  environment: qa

secretGenerator:
- name: db-secret
  type: Opaque
  literals:
  - password=PLACEHOLDER_PASSWORD
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
images:
- name: frontend
  newName: 563571752566.dkr.ecr.us-east-1.amazonaws.com/voting-app-frontend
  newTag: nightly-20260509
- name: result
  newName: 563571752566.dkr.ecr.us-east-1.amazonaws.com/voting-app-result
  newTag: nightly-20260509
- name: vote
  newName: 563571752566.dkr.ecr.us-east-1.amazonaws.com/voting-app-vote
  newTag: nightly-20260509
- name: worker
  newName: 563571752566.dkr.ecr.us-east-1.amazonaws.com/voting-app-worker
  newTag: nightly-20260509


patches:
- patch: |-
    - op: add
      path: /spec/template/metadata/labels/environment
      value: qa
  target:
    kind: Rollout
    name: vote
