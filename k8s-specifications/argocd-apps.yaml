apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: voting-app-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/davidhsiaotw/voting-infra.git
    targetRevision: HEAD
    path: k8s-specifications/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: ""
      kind: Service
      name: frontend
      jsonPointers:
        - /metadata/annotations/service.beta.kubernetes.io~1aws-load-balancer-ssl-cert
---
