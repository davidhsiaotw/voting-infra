apiVersion: apps/v1
kind: Deployment
metadata:
  name: result
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      containers:
      - name: result
        image: result
        ports:
        - containerPort: 80
        env:
        - name: DB_PASSWORD
          value: "v4gX9^D4cv"
