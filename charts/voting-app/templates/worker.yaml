apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: "{{ .Values.image.registry }}/voting-app-worker:{{ .Values.image.tag }}"
        env:
        - name: REDIS_HOST
          value: "redis"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: {{ .Values.database.password | quote }}
        - name: DB_HOST
          value: "db"
        - name: DB_NAME
          value: "postgres"
