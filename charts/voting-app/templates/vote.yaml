apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-vote
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
      - name: vote
        image: "{{ .Values.image.registry }}/voting-app-vote:{{ .Values.image.tag }}"
        ports:
        - containerPort: 80
        env:
        - name: REDIS_HOST
          value: "redis"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: {{ .Values.database.password | quote }}
        - name: DB_HOST
          value: "db"
        - name: DB_NAME
          value: "postgres"
        readinessProbe:
          httpGet:
            path: /api/options
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/options
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: vote
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: vote
